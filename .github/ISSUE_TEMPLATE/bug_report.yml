name: Bug report
description: Report a reproducible problem with gPlug Energy Cockpit
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve gPlug Energy Cockpit.
  - type: input
    id: home_assistant
    attributes:
      label: Home Assistant version
      placeholder: 2026.3.0
    validations:
      required: true
  - type: input
    id: integration
    attributes:
      label: Integration version
      placeholder: 0.3.3
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Problem description
      description: What happened and what did you expect?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant Home Assistant log
      render: text
